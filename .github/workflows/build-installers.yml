name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win nsis
            artifact: windows-installer
          - os: macos-latest
            target: --mac dmg
            artifact: macos-installer
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (if present)
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "No frontend build script - skipping"
          fi

      - name: Build installer
        run: npx electron-builder ${{ matrix.target }} --publish never
        env:
          # Disable code signing on macOS (no certs configured)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            release/*.exe
            release/*.dmg
          if-no-files-found: error
